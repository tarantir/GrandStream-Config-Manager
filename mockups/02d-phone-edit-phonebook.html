<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit 1001 — Phonebook — GS Config Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-full">

  <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3 flex items-center gap-8">
    <a href="#" class="text-sky-400 font-semibold text-lg tracking-tight mono">GS Config Manager</a>
    <div class="flex gap-6 text-sm text-slate-400">
      <a href="#" class="text-white transition-colors">Phones</a>
      <a href="#" class="hover:text-white transition-colors">Phone Book</a>
      <a href="#" class="hover:text-white transition-colors">Settings</a>
    </div>
  </nav>

  <main class="px-6 py-8 max-w-7xl mx-auto">

    <!-- Phone header -->
    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="#" class="text-slate-500 hover:text-slate-300 text-sm">← Phones</a>
        <div>
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-white mono">1001</h1>
            <span class="px-2 py-0.5 bg-sky-900/50 border border-sky-700/50 text-sky-300 text-xs rounded-md font-medium mono">GRP2612W</span>
          </div>
          <div class="flex gap-4 mt-1 text-xs text-slate-500 mono">
            <span>S/N: C0BADDCAFE01</span>
            <span>eth0: c0baddcafe01</span>
            <span>wlan: c0baddcafe02</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3 items-center">
        <button class="px-4 py-2 bg-slate-700 text-sm rounded-lg border border-slate-600">Import XML</button>
        <button class="px-4 py-2 bg-emerald-700 text-sm rounded-lg font-medium">Generate XML</button>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="flex gap-1 border-b border-slate-700 mb-6">
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">SIP</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">WiFi</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">Keys</button>
      <button class="px-4 py-2 text-sm rounded-t-lg bg-slate-800 text-white border border-slate-700 border-b-slate-800 -mb-px z-10">Phonebook</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">Personalize</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">Provisioning</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400">VPN</button>
    </div>

    <!-- Phonebook tab -->
    <div class="mb-4 flex items-center gap-2 px-3 py-2 bg-slate-700/40 border border-slate-600/50 rounded-lg text-xs text-slate-400 w-fit">
      <span class="text-slate-500">📖</span>
      The phonebook file on your TFTP server must be named <span class="mono text-slate-200 mx-1">phonebook.xml</span>
    </div>

    <div class="grid grid-cols-2 gap-5 max-w-2xl">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Server <span class="text-xs text-slate-500 normal-case">(phonebook.download → server)</span></label>
        <input type="text" value="192.168.1.1"
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Mode <span class="text-xs text-slate-500 normal-case">(phonebook.download → mode)</span></label>
        <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
          <option selected>EnabledUseTFTP</option>
          <option>EnabledUseHTTP</option>
          <option>EnabledUseHTTPS</option>
          <option>Disabled</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Sync Interval (minutes) <span class="text-xs text-slate-500 normal-case">(phonebook.download → interval)</span></label>
        <input type="number" value="720"
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Sort By <span class="text-xs text-slate-500 normal-case">(phonebook → sortby)</span></label>
        <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
          <option selected>FirstName</option>
          <option>LastName</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Key Function <span class="text-xs text-slate-500 normal-case">(phonebook → keyfunction)</span></label>
        <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
          <option selected>LocalPhonebook</option>
          <option>Default</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Default Search Mode <span class="text-xs text-slate-500 normal-case">(phonebook → defaultsearchmode)</span></label>
        <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
          <option selected>QuickMatch</option>
          <option>ExactMatch</option>
        </select>
      </div>
    </div>

    <!-- Save bar -->
    <div class="mt-8 flex gap-3 pt-4 border-t border-slate-700">
      <button type="button" class="px-5 py-2 bg-sky-700 rounded-lg text-sm font-medium">Save Configuration</button>
      <a href="#" class="px-5 py-2 bg-slate-700 rounded-lg text-sm">Cancel</a>
    </div>

  </main>
</body>
</html>
