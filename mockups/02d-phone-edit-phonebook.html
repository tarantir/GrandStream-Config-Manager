<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit 1001 — Phonebook — GS Config Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-[#f4f6f8] text-[#1a2332] min-h-full">

  <nav class="bg-[#00679e] px-6 py-3 flex items-center gap-8 shadow-sm">
    <a href="01-phones.html" class="text-white font-semibold text-lg tracking-tight mono">GS Config Manager</a>
    <div class="flex gap-6 text-sm text-white/80">
      <a href="01-phones.html" class="text-white font-medium transition-colors">Phones</a>
      <a href="03-phonebook.html" class="hover:text-white transition-colors">Phone Book</a>
      <a href="04-settings.html" class="hover:text-white transition-colors">Settings</a>
    </div>
  </nav>

  <main class="px-6 py-8 max-w-7xl mx-auto">

    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="01-phones.html" class="text-[#5a6a7a] hover:text-[#1a2332] text-sm transition-colors">← Phones</a>
        <div>
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-[#00679e] mono">1001</h1>
            <span class="px-2 py-0.5 bg-[#e8f4fb] border border-[#00679e]/30 text-[#00679e] text-xs rounded-md font-medium mono">GRP2612W</span>
          </div>
          <div class="flex gap-4 mt-1 text-xs text-[#9aabb8] mono">
            <span>S/N: C0BADDCAFE01</span>
            <span>eth0: c0baddcafe01</span>
            <span>wlan: c0baddcafe02</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3 items-center">
        <button onclick="showToast('XML imported (demo)')" class="px-4 py-2 bg-white hover:bg-[#f4f6f8] text-[#1a2332] text-sm rounded-lg border border-[#e0e4e8] transition-colors">Import XML</button>
        <button onclick="showToast('cfg1001.xml written → ./output/')" class="px-4 py-2 bg-[#1e7e4a] hover:bg-[#166038] text-white text-sm rounded-lg font-medium transition-colors">Generate XML</button>
      </div>
    </div>

    <!-- Tab bar — Phonebook active -->
    <div class="flex gap-1 border-b border-[#e0e4e8] mb-6">
      <button onclick="window.location.href='02a-phone-edit-sip.html'"          class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">SIP</button>
      <button onclick="window.location.href='02b-phone-edit-wifi.html'"         class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">WiFi</button>
      <button onclick="window.location.href='02f-phone-edit-keys.html'"               class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Keys</button>
      <button class="px-4 py-2 text-sm rounded-t-lg bg-white text-[#00679e] font-medium border border-[#e0e4e8] border-b-white -mb-px z-10">Phonebook</button>
      <button onclick="window.location.href='02e-phone-edit-personalize.html'"  class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Personalize</button>
      <button onclick="showToast('Security tab — not yet mocked up')"       class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Security</button>
      <button onclick="window.location.href='02c-phone-edit-vpn.html'"          class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">VPN</button>
    </div>

    <div class="mb-4 flex items-center gap-2 px-3 py-2 bg-[#e8f4fb] border border-[#00679e]/20 rounded-lg text-xs text-[#5a6a7a] w-fit">
      <span>📖</span>
      The phonebook file on your TFTP server must be named <span class="mono text-[#1a2332] mx-1">phonebook.xml</span>
    </div>

    <div class="grid grid-cols-2 gap-5 max-w-2xl">
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Server <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook.download → server)</span></label>
        <input type="text" value="192.168.1.1" class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm mono text-[#1a2332] focus:ring-2 focus:ring-[#00679e]/20 focus:border-[#00679e] outline-none transition-colors">
      </div>
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Mode <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook.download → mode)</span></label>
        <select class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm text-[#1a2332] focus:outline-none focus:border-[#00679e]">
          <option selected>EnabledUseTFTP</option><option>EnabledUseHTTP</option><option>EnabledUseHTTPS</option><option>Disabled</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Sync Interval (minutes) <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook.download → interval)</span></label>
        <input type="number" value="720" class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm mono text-[#1a2332] focus:ring-2 focus:ring-[#00679e]/20 focus:border-[#00679e] outline-none transition-colors">
      </div>
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Sort By <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook → sortby)</span></label>
        <select class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm text-[#1a2332] focus:outline-none focus:border-[#00679e]">
          <option selected>FirstName</option><option>LastName</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Key Function <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook → keyfunction)</span></label>
        <select class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm text-[#1a2332] focus:outline-none focus:border-[#00679e]">
          <option selected>LocalPhonebook</option><option>Default</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-[#5a6a7a] mb-1">Default Search Mode <span class="text-xs text-[#9aabb8] normal-case mono">(phonebook → defaultsearchmode)</span></label>
        <select class="w-full bg-white border border-[#e0e4e8] rounded-lg px-3 py-2 text-sm text-[#1a2332] focus:outline-none focus:border-[#00679e]">
          <option selected>QuickMatch</option><option>ExactMatch</option>
        </select>
      </div>
    </div>

    <div class="mt-8 flex gap-3 pt-4 border-t border-[#e0e4e8]">
      <button onclick="showToast('Configuration saved')" class="px-5 py-2 bg-[#00679e] hover:bg-[#005580] text-white rounded-lg text-sm font-medium transition-colors">Save Configuration</button>
      <a href="01-phones.html" class="px-5 py-2 bg-white hover:bg-[#f4f6f8] border border-[#e0e4e8] text-[#1a2332] rounded-lg text-sm transition-colors">Cancel</a>
    </div>

  </main>

  <div id="toast" class="hidden fixed bottom-6 right-6 bg-[#1a2332] text-white text-sm px-4 py-2.5 rounded-lg shadow-lg z-50 transition-all"></div>

  <script>
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      t.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.classList.add('hidden'), 300); }, 2500);
    }
  </script>
</body>
</html>
