<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit 1001 — GS Config Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' } } } }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-full">

  <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3 flex items-center gap-8">
    <a href="#" class="text-sky-400 font-semibold text-lg tracking-tight mono">GS Config Manager</a>
    <div class="flex gap-6 text-sm text-slate-400">
      <a href="#" class="text-white transition-colors">Phones</a>
      <a href="#" class="hover:text-white transition-colors">Phone Book</a>
      <a href="#" class="hover:text-white transition-colors">Settings</a>
    </div>
  </nav>

  <main class="px-6 py-8 max-w-7xl mx-auto">

    <!-- Phone header -->
    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="#" class="text-slate-500 hover:text-slate-300 text-sm">← Phones</a>
        <div>
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-white mono">1001</h1>
            <span class="px-2 py-0.5 bg-sky-900/50 border border-sky-700/50 text-sky-300 text-xs rounded-md font-medium mono">GRP2612W</span>
          </div>
          <div class="flex gap-4 mt-1 text-xs text-slate-500 mono">
            <span>S/N: C0BADDCAFE01</span>
            <span>eth0: c0baddcafe01</span>
            <span>wlan: c0baddcafe02</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3 items-center">
        <button class="px-4 py-2 bg-slate-700 text-sm rounded-lg border border-slate-600">Import XML</button>
        <button class="px-4 py-2 bg-emerald-700 text-sm rounded-lg font-medium">Generate XML</button>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="flex gap-1 border-b border-slate-700 mb-6">
      <button class="px-4 py-2 text-sm rounded-t-lg bg-slate-800 text-white border border-slate-700 border-b-slate-800 -mb-px z-10">SIP</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400 hover:text-slate-200">WiFi</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400 hover:text-slate-200">Keys</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400 hover:text-slate-200">Phonebook</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400 hover:text-slate-200">Display</button>
      <button class="px-4 py-2 text-sm rounded-t-lg text-slate-400 hover:text-slate-200">Provisioning</button>
    </div>

    <!-- Display Tab content -->
    <div>

      <!-- Wallpaper -->
      <div class="grid grid-cols-2 gap-5 max-w-lg">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Wallpaper Color</label>
          <div class="flex gap-2 items-center">
            <input type="color" value="#1a1a2e"
              class="w-10 h-10 rounded cursor-pointer bg-transparent border-0 p-0">
            <input type="text" value="#1a1a2e"
              class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Wallpaper Source</label>
          <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
            <option selected>ColorBackground</option>
            <option>DefaultBackground</option>
            <option>DownloadFromServer</option>
          </select>
        </div>
      </div>

      <!-- Date & Time -->
      <div class="mt-6 pt-5 border-t border-slate-700">
        <h3 class="text-xs text-slate-400 uppercase tracking-wider mb-4">Date &amp; Time</h3>
        <div class="grid grid-cols-2 gap-5 max-w-lg">
          <div>
            <label class="block text-xs text-slate-400 mb-1">Date Format <span class="text-slate-600 normal-case">(datetime.format → date)</span></label>
            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
              <option selected>yyyy-mm-dd</option>
              <option>mm/dd/yyyy</option>
              <option>dd/mm/yyyy</option>
              <option>mm-dd-yyyy</option>
              <option>dd-mm-yyyy</option>
              <option>yyyy/mm/dd</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Time Format <span class="text-slate-600 normal-case">(datetime.format → time)</span></label>
            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
              <option selected>24Hour</option>
              <option>12Hour</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Show on Status Bar <span class="text-slate-600 normal-case">(datetime → showonstatusbar)</span></label>
            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
              <option value="noDate">No Date</option>
              <option value="shortDate">Short Date</option>
              <option value="fullDate" selected>Full Date</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Screensaver -->
      <div class="mt-6 pt-5 border-t border-slate-700">
        <h3 class="text-xs text-slate-400 uppercase tracking-wider mb-4">Screensaver</h3>
        <div class="grid grid-cols-2 gap-5 max-w-lg">

          <!-- Screensaver Enabled (off) -->
          <div class="col-span-2 flex items-center gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer">
              <div class="w-11 h-6 bg-slate-700 peer-focus:ring-2 peer-focus:ring-sky-500 rounded-full peer
                peer-checked:after:translate-x-full peer-checked:bg-sky-600
                after:content-[''] after:absolute after:top-0.5 after:left-[2px]
                after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
            </label>
            <span class="text-sm text-slate-300">Screensaver Enabled</span>
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-1">Source</label>
            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
              <option selected>Default</option>
              <option>DownloadFromServer</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Timeout (minutes)</label>
            <input type="number" value="3"
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
          </div>

          <!-- Show Date & Time (on) -->
          <div class="col-span-2 flex items-center gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" checked class="sr-only peer">
              <div class="w-11 h-6 bg-slate-700 peer-focus:ring-2 peer-focus:ring-sky-500 rounded-full peer
                peer-checked:after:translate-x-full peer-checked:bg-sky-600
                after:content-[''] after:absolute after:top-0.5 after:left-[2px]
                after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all after:translate-x-full"></div>
            </label>
            <span class="text-sm text-slate-300">Show Date &amp; Time</span>
          </div>

          <!-- Use Programmable Keys (off) -->
          <div class="col-span-2 flex items-center gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer">
              <div class="w-11 h-6 bg-slate-700 peer-focus:ring-2 peer-focus:ring-sky-500 rounded-full peer
                peer-checked:after:translate-x-full peer-checked:bg-sky-600
                after:content-[''] after:absolute after:top-0.5 after:left-[2px]
                after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
            </label>
            <span class="text-sm text-slate-300">Use Programmable Keys</span>
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-1">Server Path</label>
            <input type="text" value=""
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Download XML Interval (s)</label>
            <input type="number" value="0"
              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:ring-1 focus:ring-sky-500 outline-none">
          </div>

        </div>
      </div>

    </div>

    <!-- Save bar -->
    <div class="mt-6 flex gap-3 pt-4 border-t border-slate-700">
      <button type="button" class="px-5 py-2 bg-sky-700 rounded-lg text-sm font-medium">Save Configuration</button>
      <a href="#" class="px-5 py-2 bg-slate-700 rounded-lg text-sm">Cancel</a>
    </div>

  </main>
</body>
</html>
