<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit 1001 WiFi — GS Config Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-[#f4f6f8] text-[#1a2332] min-h-full">

  <nav class="bg-[#00679e] px-6 py-3 flex items-center gap-8 shadow-sm">
    <a href="01-phones.html" class="text-white font-semibold text-lg tracking-tight mono">GS Config Manager</a>
    <div class="flex gap-6 text-sm text-white/80">
      <a href="01-phones.html" class="text-white font-medium transition-colors">Phones</a>
      <a href="03-phonebook.html" class="hover:text-white transition-colors">Phone Book</a>
      <a href="04-settings.html" class="hover:text-white transition-colors">Settings</a>
    </div>
  </nav>

  <main class="px-6 py-8 max-w-7xl mx-auto">

    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="01-phones.html" class="text-[#5a6a7a] hover:text-[#1a2332] text-sm transition-colors">← Phones</a>
        <div>
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold text-[#00679e] mono">1001</h1>
            <span class="px-2 py-0.5 bg-[#e8f4fb] border border-[#00679e]/30 text-[#00679e] text-xs rounded-md font-medium mono">GRP2612W</span>
          </div>
          <div class="flex gap-4 mt-1 text-xs text-[#9aabb8] mono">
            <span>S/N: C0BADDCAFE01</span>
            <span>eth0: c0baddcafe01</span>
            <span>wlan: c0baddcafe02</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="showToast('XML imported (demo)')" class="px-4 py-2 bg-white hover:bg-[#f4f6f8] text-[#1a2332] text-sm rounded-lg border border-[#e0e4e8] transition-colors">Import XML</button>
        <button onclick="showToast('cfg1001.xml written → ./output/')" class="px-4 py-2 bg-[#1e7e4a] hover:bg-[#166038] text-white text-sm rounded-lg font-medium transition-colors">Generate XML</button>
      </div>
    </div>

    <!-- Tab bar — WiFi active -->
    <div class="flex gap-1 border-b border-[#e0e4e8] mb-6">
      <button onclick="window.location.href='02a-phone-edit-sip.html'"          class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">SIP</button>
      <button class="px-4 py-2 text-sm rounded-t-lg bg-white text-[#00679e] font-medium border border-[#e0e4e8] border-b-white -mb-px z-10">WiFi</button>
      <button onclick="showToast('Keys tab — not yet mocked up')"               class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Keys</button>
      <button onclick="window.location.href='02d-phone-edit-phonebook.html'"    class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Phonebook</button>
      <button onclick="window.location.href='02e-phone-edit-personalize.html'"  class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Personalize</button>
      <button onclick="showToast('Security tab — not yet mocked up')"       class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">Security</button>
      <button onclick="window.location.href='02c-phone-edit-vpn.html'"          class="px-4 py-2 text-sm rounded-t-lg text-[#5a6a7a] hover:text-[#1a2332] transition-colors cursor-pointer">VPN</button>
    </div>

    <!-- WiFi controls -->
    <div class="flex items-center gap-6 mb-6">
      <div class="flex items-center gap-3">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="wifi-enabled" checked class="sr-only peer">
          <div class="w-11 h-6 bg-[#e0e4e8] peer-focus:ring-2 peer-focus:ring-[#00679e]/40 rounded-full peer
            peer-checked:after:translate-x-full peer-checked:bg-[#00679e]
            after:content-[''] after:absolute after:top-0.5 after:left-[2px]
            after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
        </label>
        <div>
          <span class="text-sm text-[#1a2332]">WiFi Enabled</span>
          <p class="text-xs text-[#9aabb8] mono">network.wifi → enable</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs text-[#5a6a7a]">Band <span class="text-[#9aabb8] mono">(network.wifi → band)</span></label>
        <select class="bg-white border border-[#e0e4e8] rounded-lg px-3 py-1.5 text-sm text-[#1a2332] focus:outline-none focus:border-[#00679e]">
          <option selected>Auto</option>
          <option>2.4GHz</option>
          <option>5GHz</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs text-[#5a6a7a]">Country Code <span class="text-[#9aabb8] mono">(network.wifi.countryCode → public)</span></label>
        <input type="text" value="US" class="w-16 bg-white border border-[#e0e4e8] rounded-lg px-3 py-1.5 text-sm mono text-[#1a2332] focus:outline-none focus:border-[#00679e]">
      </div>
    </div>

    <!-- SSID table -->
    <div class="bg-white border border-[#e0e4e8] rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-[#f4f6f8]">
          <tr class="border-b border-[#e0e4e8] text-[#5a6a7a] text-xs uppercase tracking-wider">
            <th class="px-4 py-3 text-left w-10">#</th>
            <th class="px-4 py-3 text-left">SSID <span class="normal-case text-[#9aabb8] font-normal mono">(essid)</span></th>
            <th class="px-4 py-3 text-left">Password <span class="normal-case text-[#9aabb8] font-normal mono">(psk)</span></th>
            <th class="px-4 py-3 text-left w-36">Key Mgmt <span class="normal-case text-[#9aabb8] font-normal mono">(key_management)</span></th>
            <th class="px-4 py-3 text-left w-16">Hidden <span class="normal-case text-[#9aabb8] font-normal mono">(hidden)</span></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#e0e4e8]">
          <tr class="hover:bg-[#f4f6f8] transition-colors">
            <td class="px-4 py-2 text-[#5a6a7a] mono text-xs font-medium">0</td>
            <td class="px-4 py-2"><input type="text" value="OfficeWifi" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] focus:outline-none focus:border-[#00679e]"></td>
            <td class="px-4 py-2">
              <div class="relative">
                <input type="password" value="p4ssw0rd!" id="psk-0" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] pr-10 focus:outline-none focus:border-[#00679e]">
                <button type="button" onclick="togglePsk(0, this)" class="absolute right-2 top-1.5 text-[#9aabb8] hover:text-[#5a6a7a] text-xs transition-colors">show</button>
              </div>
            </td>
            <td class="px-4 py-2">
              <select class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs text-[#1a2332] focus:outline-none focus:border-[#00679e]">
                <option>WPA_PSK</option><option selected>WPA2_PSK</option><option>WPA_EAP</option><option>WPA2_EAP</option><option>OPEN</option>
              </select>
            </td>
            <td class="px-4 py-2 text-center"><input type="checkbox" class="w-4 h-4 rounded accent-[#00679e]"></td>
          </tr>
          <tr class="hover:bg-[#f4f6f8] transition-colors">
            <td class="px-4 py-2 text-[#5a6a7a] mono text-xs font-medium">1</td>
            <td class="px-4 py-2"><input type="text" value="" placeholder="Network name" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] placeholder-[#9aabb8] focus:outline-none focus:border-[#00679e]"></td>
            <td class="px-4 py-2">
              <div class="relative">
                <input type="password" value="" id="psk-1" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] pr-10 focus:outline-none focus:border-[#00679e]">
                <button type="button" onclick="togglePsk(1, this)" class="absolute right-2 top-1.5 text-[#9aabb8] hover:text-[#5a6a7a] text-xs transition-colors">show</button>
              </div>
            </td>
            <td class="px-4 py-2">
              <select class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs text-[#1a2332] focus:outline-none focus:border-[#00679e]">
                <option selected>WPA_PSK</option><option>WPA2_PSK</option><option>WPA_EAP</option><option>WPA2_EAP</option><option>OPEN</option>
              </select>
            </td>
            <td class="px-4 py-2 text-center"><input type="checkbox" class="w-4 h-4 rounded accent-[#00679e]"></td>
          </tr>
          <tr class="hover:bg-[#f4f6f8] transition-colors">
            <td class="px-4 py-2 text-[#5a6a7a] mono text-xs font-medium">2</td>
            <td class="px-4 py-2"><input type="text" value="" placeholder="Network name" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] placeholder-[#9aabb8] focus:outline-none focus:border-[#00679e]"></td>
            <td class="px-4 py-2">
              <div class="relative">
                <input type="password" value="" id="psk-2" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] pr-10 focus:outline-none focus:border-[#00679e]">
                <button type="button" onclick="togglePsk(2, this)" class="absolute right-2 top-1.5 text-[#9aabb8] hover:text-[#5a6a7a] text-xs transition-colors">show</button>
              </div>
            </td>
            <td class="px-4 py-2">
              <select class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs text-[#1a2332] focus:outline-none focus:border-[#00679e]">
                <option selected>WPA_PSK</option><option>WPA2_PSK</option><option>WPA_EAP</option><option>WPA2_EAP</option><option>OPEN</option>
              </select>
            </td>
            <td class="px-4 py-2 text-center"><input type="checkbox" class="w-4 h-4 rounded accent-[#00679e]"></td>
          </tr>
          <tr class="hover:bg-[#f4f6f8] transition-colors">
            <td class="px-4 py-2 text-[#5a6a7a] mono text-xs font-medium">3</td>
            <td class="px-4 py-2"><input type="text" value="" placeholder="Network name" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] placeholder-[#9aabb8] focus:outline-none focus:border-[#00679e]"></td>
            <td class="px-4 py-2">
              <div class="relative">
                <input type="password" value="" id="psk-3" class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs mono text-[#1a2332] pr-10 focus:outline-none focus:border-[#00679e]">
                <button type="button" onclick="togglePsk(3, this)" class="absolute right-2 top-1.5 text-[#9aabb8] hover:text-[#5a6a7a] text-xs transition-colors">show</button>
              </div>
            </td>
            <td class="px-4 py-2">
              <select class="w-full bg-white border border-[#e0e4e8] rounded px-2 py-1.5 text-xs text-[#1a2332] focus:outline-none focus:border-[#00679e]">
                <option selected>WPA_PSK</option><option>WPA2_PSK</option><option>WPA_EAP</option><option>WPA2_EAP</option><option>OPEN</option>
              </select>
            </td>
            <td class="px-4 py-2 text-center"><input type="checkbox" class="w-4 h-4 rounded accent-[#00679e]"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex gap-3 pt-4 border-t border-[#e0e4e8]">
      <button onclick="showToast('Configuration saved')" class="px-5 py-2 bg-[#00679e] hover:bg-[#005580] text-white rounded-lg text-sm font-medium transition-colors">Save Configuration</button>
      <a href="01-phones.html" class="px-5 py-2 bg-white hover:bg-[#f4f6f8] border border-[#e0e4e8] text-[#1a2332] rounded-lg text-sm transition-colors">Cancel</a>
    </div>

  </main>

  <div id="toast" class="hidden fixed bottom-6 right-6 bg-[#1a2332] text-white text-sm px-4 py-2.5 rounded-lg shadow-lg z-50 transition-all"></div>

  <script>
    function togglePsk(n, btn) {
      const inp = document.getElementById(`psk-${n}`);
      if (inp.type === 'password') { inp.type = 'text';     btn.textContent = 'hide'; }
      else                         { inp.type = 'password'; btn.textContent = 'show'; }
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      t.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.classList.add('hidden'), 300); }, 2500);
    }
  </script>
</body>
</html>
