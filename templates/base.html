<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GS Config Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .hljs { background: #0d1117 !important; border-radius: 0.5rem; }
  </style>
</head>
<body class="bg-[#f4f6f8] text-[#1a2332] min-h-full">

  <!-- Top nav -->
  <nav class="bg-[#00679e] px-6 py-3 flex items-center gap-8 shadow-sm">
    <a href="/" class="text-white font-semibold text-lg tracking-tight mono">GS Config Manager</a>
    <div class="flex gap-6 text-sm text-white/80">
      <a href="/" class="hover:text-white transition-colors {% if request.url.path == '/' %}text-white font-medium{% endif %}">Phones</a>
      <a href="/phonebook" class="hover:text-white transition-colors {% if request.url.path == '/phonebook' %}text-white font-medium{% endif %}">Phone Book</a>
      <a href="/settings" class="hover:text-white transition-colors {% if request.url.path == '/settings' %}text-white font-medium{% endif %}">Settings</a>
    </div>
  </nav>

  <!-- Flash message -->
  {% if flash %}
  <div id="flash-banner" class="px-6 py-3 text-sm font-medium
    {% if flash.cat == 'success' %}bg-[#d4edda] border-b border-[#c3e6cb] text-[#155724]
    {% elif flash.cat == 'error' %}bg-[#f8d7da] border-b border-[#f5c6cb] text-[#721c24]
    {% else %}bg-[#d0ecf8] border-b border-[#bee5eb] text-[#0c5460]{% endif %}
    flex items-center justify-between">
    <span>{{ flash.msg }}</span>
    <button onclick="document.getElementById('flash-banner').remove()" class="ml-4 opacity-60 hover:opacity-100">✕</button>
  </div>
  {% endif %}

  <main class="px-6 py-8 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  <!-- XML Preview Modal -->
  <div id="xml-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white border border-[#e0e4e8] rounded-xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh]">
      <div class="flex items-center justify-between px-5 py-4 border-b border-[#e0e4e8]">
        <div>
          <h2 class="text-[#1a2332] font-semibold">Generated XML</h2>
          <p id="xml-modal-filename" class="text-[#5a6a7a] text-sm mono mt-0.5"></p>
        </div>
        <div class="flex gap-3">
          <button onclick="copyXml()" class="px-3 py-1.5 bg-[#f4f6f8] hover:bg-[#e0e4e8] border border-[#e0e4e8] text-sm rounded-lg transition-colors text-[#1a2332]" id="copy-btn">Copy</button>
          <button onclick="closeModal()" class="px-3 py-1.5 bg-[#f4f6f8] hover:bg-[#e0e4e8] border border-[#e0e4e8] text-sm rounded-lg transition-colors text-[#1a2332]">✕ Close</button>
        </div>
      </div>
      <div class="overflow-auto flex-1 p-4">
        <pre class="text-xs"><code id="xml-preview" class="language-xml"></code></pre>
      </div>
    </div>
  </div>

  <script>
    function openXmlModal(filename, xml) {
      document.getElementById('xml-modal-filename').textContent = filename;
      const codeEl = document.getElementById('xml-preview');
      codeEl.textContent = xml;
      hljs.highlightElement(codeEl);
      document.getElementById('xml-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('xml-modal').classList.add('hidden');
    }

    function copyXml() {
      const text = document.getElementById('xml-preview').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    document.getElementById('xml-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      const colors = { success: 'bg-[#1e7e4a] border-[#166038] text-white',
                       error: 'bg-[#c0392b] border-[#a93226] text-white',
                       info: 'bg-[#00679e] border-[#005580] text-white' };
      toast.className = `fixed bottom-6 right-6 z-50 px-4 py-3 rounded-lg border text-sm font-medium shadow-xl transition-all ${colors[type] || colors.info}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
