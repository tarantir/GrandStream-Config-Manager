{% extends "base.html" %}
{% block title %}Settings — GS Config Manager{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-semibold text-white">Settings</h1>
  <p class="text-slate-400 text-sm mt-1">Global application configuration</p>
</div>

<form action="/settings" method="post" class="max-w-xl">
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 space-y-5">
    <div>
      <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Output Directory</label>
      <input type="text" name="output_dir" value="{{ settings.get('output_dir', './output') }}"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 focus:border-sky-500 outline-none">
      <p class="text-xs text-slate-500 mt-1">Relative or absolute path where XML files are written.</p>
    </div>

    <div>
      <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Default SIP Server 1</label>
      <input type="text" name="default_sip_server_1" value="{{ settings.get('default_sip_server_1', '192.168.1.1') }}"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 focus:border-sky-500 outline-none">
    </div>

    <div>
      <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Default SIP Server 2</label>
      <input type="text" name="default_sip_server_2" value="{{ settings.get('default_sip_server_2', 'pbx.example.com') }}"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 focus:border-sky-500 outline-none">
    </div>

    <div>
      <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider">Default Phonebook Server</label>
      <input type="text" name="default_phonebook_server" value="{{ settings.get('default_phonebook_server', '192.168.1.1') }}"
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm mono text-slate-200 focus:ring-1 focus:ring-sky-500 focus:border-sky-500 outline-none">
    </div>
  </div>

  <div class="mt-4 flex gap-3">
    <button type="submit" class="px-5 py-2 bg-sky-700 hover:bg-sky-600 rounded-lg text-sm font-medium transition-colors">
      Save Settings
    </button>
    <a href="/" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm rounded-lg transition-colors">Cancel</a>
  </div>
</form>
{% endblock %}
